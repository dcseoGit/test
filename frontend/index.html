<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- 왼쪽 사이드바 -->
  <aside class="w-52 min-h-screen bg-indigo-900 text-white flex flex-col shrink-0">
    <div class="px-5 py-5 text-xl font-bold border-b border-indigo-700 tracking-wide">TaskFlow</div>
    <nav class="flex-1 py-3">
      <button onclick="showPage('tasks')" id="menu-tasks"
        class="menu-item w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-indigo-700 transition text-sm font-medium">
        📋 업무 관리
      </button>
      <div class="px-5 pt-4 pb-1 text-xs text-indigo-400 uppercase tracking-wider">게임</div>
      <button onclick="showPage('ladder')" id="menu-ladder"
        class="menu-item w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-indigo-700 transition text-sm font-medium">
        🪜 사다리게임
      </button>
      <button onclick="showPage('roulette')" id="menu-roulette"
        class="menu-item w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-indigo-700 transition text-sm font-medium">
        🎰 룰렛
      </button>
      <button onclick="showPage('archery')" id="menu-archery"
        class="menu-item w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-indigo-700 transition text-sm font-medium">
        🏹 화살 과녁
      </button>
    </nav>
  </aside>

  <!-- 메인 콘텐츠 -->
  <main class="flex-1 overflow-auto">

    <!-- 업무 관리 페이지 -->
    <div id="page-tasks" class="max-w-2xl mx-auto py-10 px-4">
      <h1 class="text-3xl font-bold text-indigo-700 mb-8 text-center">업무 관리</h1>

      <div class="bg-white rounded-xl shadow p-5 mb-6">
        <div class="flex gap-3 flex-wrap">
          <input id="taskInput" type="text" placeholder="새 업무를 입력하세요"
            class="flex-1 min-w-0 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" />
          <select id="timeSelect"
            class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-sm">
            <option value="">시간 선택</option>
          </select>
          <button id="addBtn"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2 rounded-lg transition">
            추가
          </button>
        </div>
      </div>

      <div class="flex gap-2 mb-5 flex-wrap">
        <button class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium" data-filter="all">전체</button>
        <button class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-gray-200 text-gray-600" data-filter="todo">할 일</button>
        <button class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-gray-200 text-gray-600" data-filter="in_progress">진행 중</button>
        <button class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-gray-200 text-gray-600" data-filter="done">완료</button>
      </div>

      <div id="taskList" class="space-y-3"></div>
      <div id="emptyMsg" class="text-center text-gray-400 mt-16 hidden">
        <p class="text-lg">등록된 업무가 없습니다.</p>
      </div>
    </div>

    <!-- 사다리게임 페이지 -->
    <div id="page-ladder" class="hidden py-10 px-6">
      <div class="flex items-center justify-between mb-6 max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-indigo-700">사다리게임</h1>
        <div class="flex gap-2">
          <button onclick="addLadderPlayer()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition">
            + 참가자 추가
          </button>
          <button onclick="resetLadderPlayers()"
            class="bg-red-100 hover:bg-red-200 text-red-600 text-sm font-semibold px-4 py-2 rounded-lg transition">
            참가자 초기화
          </button>
        </div>
      </div>

      <div class="flex flex-col items-center">
        <!-- 참가자·캔버스·결과를 하나의 스크롤 컨테이너 안에 배치 -->
        <div class="overflow-x-auto pb-1 max-w-full">
          <div class="inline-flex flex-col items-start">
            <div id="ladderPlayerRow" class="flex mb-2"></div>
            <canvas id="ladderCanvas" class="block"></canvas>
            <div id="ladderResultRow" class="flex mt-2"></div>
          </div>
        </div>

        <!-- 버튼 -->
        <div class="flex gap-3 mt-6 flex-wrap justify-center">
          <button onclick="generateLadder()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 rounded-lg transition">
            사다리 생성
          </button>
          <button onclick="revealAllPaths()"
            class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-6 py-2 rounded-lg transition">
            전체 공개
          </button>
          <button onclick="resetLadder()"
            class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-6 py-2 rounded-lg transition">
            경로 초기화
          </button>
        </div>

        <!-- 결과 표시 -->
        <div id="ladderResultDisplay" class="mt-5 w-full max-w-xl"></div>
      </div>
    </div>

    <!-- 화살 과녁 페이지 -->
    <div id="page-archery" class="hidden py-6 px-6">
      <h1 class="text-3xl font-bold text-indigo-700 mb-4 text-center">🏹 화살 과녁 맞추기</h1>

      <!-- 상태바 -->
      <div class="flex justify-center gap-6 mb-4">
        <div class="bg-white rounded-xl shadow px-5 py-2 text-sm font-semibold text-gray-600">
          🏹 남은 화살 <span id="archArrowsLeft" class="text-indigo-600 text-xl font-bold ml-1">5</span>
        </div>
        <div class="bg-white rounded-xl shadow px-5 py-2 text-sm font-semibold text-gray-600">
          🎯 점수 <span id="archScore" class="text-indigo-600 text-xl font-bold ml-1">0</span>
          <span class="text-gray-400">/ 50</span>
        </div>
      </div>

      <!-- 캔버스 -->
      <div class="flex justify-center">
        <canvas id="archeryCanvas" width="800" height="460"
          class="block rounded-xl shadow-xl cursor-crosshair" style="max-width:100%"></canvas>
      </div>
      <p class="text-center text-gray-400 text-sm mt-3">마우스로 조준 후 클릭하여 발사 · 점선이 예상 궤도입니다</p>

      <!-- 점수표 -->
      <div class="flex justify-center gap-3 mt-3 text-xs">
        <span class="px-2 py-1 rounded-full bg-yellow-100 text-yellow-700 font-semibold">🟡 10점</span>
        <span class="px-2 py-1 rounded-full bg-red-100 text-red-600 font-semibold">🔴 8점</span>
        <span class="px-2 py-1 rounded-full bg-blue-100 text-blue-600 font-semibold">🔵 6점</span>
        <span class="px-2 py-1 rounded-full bg-gray-100 text-gray-600 font-semibold">⚫ 4점</span>
        <span class="px-2 py-1 rounded-full bg-slate-100 text-slate-500 font-semibold">⚪ 2점</span>
      </div>

      <!-- 게임오버 오버레이 -->
      <div id="archGameover"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl px-12 py-8 text-center">
          <div class="text-5xl mb-3">🎯</div>
          <div class="text-2xl font-bold text-gray-800 mb-1">게임 종료!</div>
          <div id="archGrade" class="text-lg font-semibold text-indigo-600 mb-3"></div>
          <div class="text-gray-500 mb-5">
            최종 점수:
            <span id="archFinalScore" class="text-3xl font-bold text-indigo-600">0</span>
            <span class="text-gray-400"> / 50</span>
          </div>
          <button onclick="restartArchery()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-3 rounded-full transition">
            다시 하기
          </button>
        </div>
      </div>
    </div>

    <!-- 룰렛 페이지 -->
    <div id="page-roulette" class="hidden py-10 px-6">
      <h1 class="text-3xl font-bold text-indigo-700 mb-8 text-center">🎰 룰렛</h1>

      <div class="flex flex-col lg:flex-row gap-8 items-center lg:items-start justify-center">

        <!-- 룰렛 휠 + 버튼 -->
        <div class="flex flex-col items-center gap-4">
          <canvas id="rouletteCanvas" width="360" height="360" class="block"></canvas>
          <button onclick="spinRoulette()"
            class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-bold px-12 py-3 rounded-full text-lg transition-all shadow-lg">
            🎰 돌리기
          </button>
          <div id="rouletteResult" class="w-72"></div>
        </div>

        <!-- 항목 관리 -->
        <div class="w-72 flex flex-col gap-3">
          <h2 class="font-bold text-gray-600 text-sm uppercase tracking-wide">항목 관리</h2>
          <div class="flex flex-col gap-2">
            <div class="flex gap-2">
              <button id="rouletteIconBtn" onclick="toggleIconPicker()"
                class="border border-gray-300 rounded-lg px-3 py-2 text-xl hover:bg-gray-50 transition shrink-0">🎯</button>
              <input id="rouletteInput" type="text" placeholder="항목 이름 입력"
                class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
              <button onclick="addRouletteItem()"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-lg transition text-sm shrink-0">
                추가
              </button>
            </div>
            <!-- 아이콘 선택 패널 -->
            <div id="rouletteIconPicker"
              class="hidden flex flex-wrap gap-1 bg-white border border-gray-200 rounded-lg p-2 shadow-md"></div>
          </div>
          <div id="rouletteList" class="flex flex-col gap-2 max-h-96 overflow-y-auto pr-1"></div>
        </div>

      </div>
    </div>

  </main>

  <script src="app.js"></script>
  <script src="ladder.js"></script>
  <script src="roulette.js"></script>
  <script src="archery.js"></script>
</body>
</html>
